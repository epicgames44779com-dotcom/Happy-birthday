<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffc0cb, #ffe6f0);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* layering */
h1, .footer {
    position: relative;
    z-index: 2;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 110px;
    color: #d1005d;
    text-shadow: 0 0 30px rgba(255,0,100,0.7);
}

/* Footer */
.footer {
    position: absolute;
    bottom: 20px;
    font-size: 34px;
    color: #6b0040;
    font-weight: bold;
}

/* 🎈 BALLOONS */
.balloon {
    position: absolute;
    width: 85px;
    height: 105px;
    border-radius: 50%;
    animation: float 8s infinite ease-in-out;
    box-shadow: inset -10px -15px 25px rgba(0,0,0,0.3),
                inset 10px 10px 20px rgba(255,255,255,0.4),
                0 10px 20px rgba(0,0,0,0.3);
}

.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 70px;
    background: #555;
    top: 100px;
    left: 50%;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-200px);}
}

/* 💖 HEARTS */
.heart {
    position: absolute;
    font-size: 30px;
    animation: floatHeart 7s linear infinite;
    opacity: 0.7;
}

@keyframes floatHeart {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-100px);}
}

/* 🎁 wrapper باش animation ما يأثرش على الكليك */
.gift-box {
    position: absolute;
    bottom: 130px;
    text-align: center;
}

/* 🎁 GIFT */
.gift-real {
    position: relative;
    width: 170px;
    height: 170px;
    cursor: pointer;
}

/* bounce (على wrapper بدل الكادو) */
.gift-box {
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* box */
.box {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, #ff4d6d, #b3002d);
    border-radius: 15px;
    position: relative;
    box-shadow: 0 15px 25px rgba(0,0,0,0.4);
}

/* shine */
.box::after {
    content: "";
    position: absolute;
    width: 40%;
    height: 100%;
    background: linear-gradient(to right, rgba(255,255,255,0.4), transparent);
}

/* ribbons */
.ribbon-v {
    position: absolute;
    width: 22px;
    height: 100%;
    background: linear-gradient(gold,#b89600);
    left: 74px;
}

.ribbon-h {
    position: absolute;
    height: 22px;
    width: 100%;
    background: linear-gradient(gold,#b89600);
    top: 74px;
}

/* 🎀 bow */
.bow {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 35px;
}

.bow::before,
.bow::after {
    content: "";
    position: absolute;
    width: 35px;
    height: 35px;
    background: gold;
    border-radius: 50%;
}

.bow::before { left: 0; }
.bow::after { right: 0; }

/* 💬 popup */
.popup {
    position: absolute;
    bottom: 190px;
    left: 50%;
    transform: translateX(-50%) scale(0.5);
    background: white;
    padding: 10px 18px;
    border-radius: 12px;
    font-weight: bold;
    color: #ff0066;
    opacity: 0;
    transition: 0.4s;
}

.gift-real.open .popup {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

/* text */
.open-text {
    position: absolute;
    bottom: 320px;
    font-size: 34px;
    color: #ff0066;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Happy birthday to you 🎉</h1>

<!-- 🎈 BALLOONS -->
<div class="balloon" style="left:10%; background:#ff4d6d;"></div>
<div class="balloon" style="left:25%; background:#ffcc00; animation-delay:1s;"></div>
<div class="balloon" style="left:50%; background:#6a5acd; animation-delay:2s;"></div>
<div class="balloon" style="left:75%; background:#00c2ff; animation-delay:1.5s;"></div>
<div class="balloon" style="left:90%; background:#ff69b4; animation-delay:3s;"></div>

<!-- 💖 HEARTS -->
<div class="heart" style="left:15%;">💖</div>
<div class="heart" style="left:35%; animation-delay:2s;">💖</div>
<div class="heart" style="left:55%; animation-delay:4s;">💖</div>
<div class="heart" style="left:75%; animation-delay:1s;">💖</div>

<!-- TEXT -->
<div class="open-text">Open the gifts 🎁 ❤️</div>

<!-- 🎁 Gift 1 -->
<div class="gift-box" style="left:20%;">
    <div class="gift-real" id="g1">
        <div class="popup">🎉 Surprise! 🎂</div>
        <div class="bow"></div>
        <div class="box">
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
        </div>
    </div>
</div>

<!-- 🎁 Gift 2 -->
<div class="gift-box" style="left:70%;">
    <div class="gift-real" id="g2">
        <div class="popup">💖 For you!</div>
        <div class="bow"></div>
        <div class="box">
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
        </div>
    </div>
</div>

<div class="footer">
    Made by Anes Guessab ✨
</div>

<script>
document.querySelectorAll('.gift-real').forEach(gift => {
    gift.addEventListener('click', () => {
        gift.classList.toggle('open');
    });
});
</script>

</body>
</html>
